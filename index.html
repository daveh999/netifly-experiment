<!DOCTYPE html>
<html>
<head>
  <title>Web Experiment</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }
    .rotating-square {
      width: 80px;
      height: 80px;
      background-color: steelblue;
      animation: spin 3s linear infinite;
      margin-top: 40px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Web Experiment</h1>
  <div class="rotating-square"></div>
</body>
</html>
